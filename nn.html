<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="AI Помощник для олимпиады Я Магистр - подача заявок, расписание, инструкции" />
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self';
        connect-src 'self' http://127.0.0.1:8000 http://localhost:8000;
        base-uri 'self';
        form-action 'self';
    " />
    <meta name="referrer" content="no-referrer" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#002B5B" />
    <title>AI Помощник — Я Магистр</title>
<style>
/* ========== БАЗОВЫЕ СБРОСЫ ========== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
    margin: 0; 
    background: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ========== SKIP LINK ДЛЯ ДОСТУПНОСТИ ========== */
.skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: #002B5B;
    color: white;
    padding: 8px 16px;
    z-index: 10000;
    text-decoration: none;
    font-weight: 600;
    border-radius: 0 0 8px 0;
    transition: top 0.3s;
}

.skip-link:focus {
    top: 0;
}

/* ========== ТЕМНАЯ ТЕМА ========== */
.chat-window.dark {
    background: #1e2937;
}

.chat-window.dark #chatArea {
    background-image: url("log.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.chat-window.dark .center-text {
    background: rgba(30, 41, 55, 0.85);
    backdrop-filter: blur(8px);
    color: #cbd5e1;
}

.chat-window.dark .bot-message {
    background: rgba(59, 130, 246, 0.9);
    backdrop-filter: blur(5px);
}

.chat-window.dark .user-message .bubble {
    background: rgba(51, 65, 85, 0.9);
    backdrop-filter: blur(5px);
    color: #e2e8f0;
}

.chat-window.dark .time {
    color: #000000;
}

.chat-window.dark .typing-indicator {
    background: rgba(59, 130, 246, 0.9);
    backdrop-filter: blur(5px);
}

.chat-window.dark .input-area {
    background: rgba(30, 41, 55, 0.7);
    backdrop-filter: blur(20px);
    border-top-color: rgba(51, 65, 85, 0.3);
}

.chat-window.dark .input-wrapper {
    background: rgba(55, 65, 81, 0.6);
    border-color: rgba(71, 85, 105, 0.3);
}

.chat-window.dark #userInput {
    color: #e2e8f0;
}

.chat-window.dark #userInput::placeholder {
    color: #94a3b8;
}

.chat-window.dark .nav-action-btn {
    background: rgba(59, 130, 246, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.chat-window.dark .lang-menu {
    background: #1f2937;
}

.chat-window.dark .lang-menu button {
    background: #334155;
}

.chat-window.dark .lang-menu button:hover {
    background: #475569;
}

.chat-window.dark .lang-current {
    background: rgba(255, 255, 255, 0.1);
}

/* ========== КНОПКА ЧАТА ========== */
.chat-button {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    background: #002B5B;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 27px;
    box-shadow: 0 5px 15px rgba(0, 43, 91, 0.35);
    cursor: pointer;
    z-index: 1000;
    transition: transform 0.2s, background 0.2s;
    border: none;
}

.chat-button:hover { 
    background: #003d82;
    transform: scale(1.05);
}

.chat-button:active {
    transform: scale(0.95);
}

/* Пульсирующая анимация для привлечения внимания */
.chat-button::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #002B5B;
    animation: chatPulse 2s ease-out infinite;
    z-index: -1;
}

@keyframes chatPulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.4); opacity: 0; }
}

/* ========== ОКНО ЧАТА ========== */
.chat-window {
    position: fixed;
    bottom: 100px;
    right: 25px;
    width: 380px;
    height: 540px;
    background: white;
    border-radius: 22px;
    box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 1000;
    animation: fadeIn 0.25s ease;
}

/* ========== ХЕДЕР ========== */
.header {
    background: #002B5B;
    color: white;
    padding: 15px 20px;
    font-weight: 600;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1;
}

.header-left span:last-child {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 15px;
}

.ai-dot {
    width: 9px;
    height: 9px;
    background: #00E676;
    border-radius: 50%;
    box-shadow: 0 0 8px #00E676;
    animation: pulse 2s infinite;
    flex-shrink: 0;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

/* ========== ОБЛАСТЬ ЧАТА ========== */
#chatArea {
    flex: 1;
    padding: 20px 18px;
    overflow-y: auto;
    position: relative;
    -webkit-overflow-scrolling: touch;
    background-image: url("log.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    backdrop-filter: blur(12px);
}

#chatArea > * {
    position: relative;
    z-index: 1;
}

#chatArea::-webkit-scrollbar { 
    width: 6px;
}

#chatArea::-webkit-scrollbar-track {
    background: transparent;
    border-radius: 3px;
}

#chatArea::-webkit-scrollbar-thumb {
    background: rgba(203, 213, 225, 0.6);
    border-radius: 3px;
}

#chatArea::-webkit-scrollbar-thumb:hover {
    background: rgba(148, 163, 184, 0.8);
}

/* ========== ЦЕНТРАЛЬНЫЙ ТЕКСТ ========== */
.center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #555;
    font-size: 17px;
    line-height: 1.5;
    max-width: 85%;
    width: auto;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    padding: 12px 20px;
    border-radius: 28px;
    pointer-events: none;
    z-index: 2;
    word-wrap: break-word;
    word-break: break-word;
    white-space: normal;
}

/* ========== СООБЩЕНИЯ ========== */
.message {
    margin-bottom: 16px;
    max-width: 85%;
    animation: messageSlide 0.3s ease;
}

@keyframes messageSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.bot-message {
    background: rgba(0, 163, 224, 0.9);
    backdrop-filter: blur(5px);
    color: white;
    padding: 12px 16px;
    border-radius: 18px;
    border-top-left-radius: 5px;
    display: inline-block;
    text-align: left;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
    max-width: 100%; 
    line-height: 1.45;
    font-size: 15px;
}

.bot-message a {
    color: #fff;
    text-decoration: underline;
    font-weight: 500;
}

.bot-message a:hover {
    opacity: 0.9;
}

.bot-message a:focus {
    outline: 2px solid #fff;
    outline-offset: 2px;
}

.bot-message b,
.bot-message strong {
    font-weight: 600;
}

.user-message {
    margin-left: auto;
    text-align: right;
}

.user-message .bubble {
    background: rgba(224, 224, 224, 0.9);
    backdrop-filter: blur(5px);
    color: #222;
    padding: 12px 16px;
    border-radius: 18px;
    border-top-right-radius: 5px;
    display: inline-block;
    text-align: left;
    word-wrap: break-word;
    overflow-wrap: break-word;
    word-break: break-word;
    max-width: 100%;
    line-height: 1.45;
    font-size: 15px;
}

.time {
    font-size: 11px;
    color: #000000;
    margin-top: 4px;
    font-weight: 500;
}

.user-message .time { 
    text-align: right; 
}

/* ========== ИНДИКАТОР ПЕЧАТИ ========== */
.typing-indicator {
    display: inline-flex;
    align-items: center;
    background: rgba(0, 163, 224, 0.9);
    backdrop-filter: blur(5px);
    color: white;
    padding: 12px 16px;
    border-radius: 18px;
    border-top-left-radius: 5px;
    margin-bottom: 16px;
}

.typing-dots {
    display: flex;
    gap: 4px;
}

.typing-dots span {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: typing 1.4s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ========== ОБЛАСТЬ ВВОДА ========== */
.input-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
}

/* ========== НАВИГАЦИОННЫЕ КНОПКИ - СЕТКА 2x2 ========== */
.nav-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.nav-action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(0, 43, 91, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 24px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
    height: 36px;
    width: 100%;
}

.nav-action-btn span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.nav-action-btn:hover {
    background: rgba(0, 43, 91, 0.95);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 43, 91, 0.3);
}

.nav-action-btn:active {
    transform: translateY(0);
}

.nav-action-btn .icon {
    font-size: 14px;
    flex-shrink: 0;
}

/* ========== СТРОКА ВВОДА ========== */
.input-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.input-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    background: rgba(248, 249, 250, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 28px;
    padding: 2px 2px 2px 16px;
    transition: border-color 0.2s;
    min-height: 44px;
}

.input-wrapper:focus-within {
    border-color: #002B5B;
    box-shadow: 0 0 0 3px rgba(0, 43, 91, 0.1);
}

#userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 10px 8px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 80px;
    min-height: 20px;
    line-height: 1.4;
    overflow-y: auto;
}

#userInput::-webkit-scrollbar {
    width: 6px;
}

#userInput::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 3px;
}

#userInput:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.send-button {
    width: 40px;
    height: 40px;
    background: #002B5B;
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background 0.2s;
}

.send-button:hover:not(:disabled) {
    background: #003d82;
    transform: scale(1.05);
}

.send-button:active:not(:disabled) {
    transform: scale(0.95);
}

.send-button:disabled {
    background: #94a3b8;
    cursor: not-allowed;
    opacity: 0.6;
}

/* ========== ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА ========== */
.lang-switcher {
    position: relative;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
}

.lang-current {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0, 43, 91, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    transition: transform 0.2s, background 0.2s;
    border: none;
}

.lang-current:hover {
    background: rgba(0, 43, 91, 0.15);
    transform: scale(1.05);
}

.lang-menu {
    position: absolute;
    bottom: 50px;
    right: 0;
    display: none;
    flex-direction: column;
    gap: 6px;
    background: white;
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    z-index: 2100;
    animation: menuSlide 0.2s ease;
}

@keyframes menuSlide {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.lang-menu button {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #f0f0f0;
    border: none;
    cursor: pointer;
    font-size: 20px;
    transition: transform 0.2s;
}

.lang-menu button:hover {
    background: #e0e0e0;
    transform: scale(1.1);
}

.lang-menu button.active {
    background: #002B5B;
    box-shadow: 0 0 0 2px #00A3E0;
}

/* ========== КНОПКИ ШАПКИ ========== */
.header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
}

.header-btn {
    background: rgba(255, 255, 255, 0.15);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: transform 0.2s, background 0.2s;
    position: relative;
}

.header-btn:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.1);
}

.header-btn:active {
    transform: scale(0.95);
}

/* ========== ТУЛТИПЫ (улучшенные для мобильных) ========== */
.tooltip {
    position: relative;
}

.tooltip::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s;
    z-index: 3100;
    pointer-events: none;
}

/* Тултипы в HEADER - показываются СНИЗУ */
.header .tooltip::after {
    top: 100%;
}

/* Тултип для ЯЗЫКА - показывается СВЕРХУ */
.lang-switcher .tooltip::after {
    bottom: 100%;
    top: auto;
}

.lang-switcher .tooltip:hover::after,
.lang-switcher .tooltip:focus::after {
    opacity: 1;
    visibility: visible;
    bottom: calc(100% + 8px);
    top: auto;
}

/* Отключаем тултипы на мобильных */
@media (hover: none) and (pointer: coarse) {
    .tooltip::after {
        display: none;
    }
}


.tooltip:hover::after,
.tooltip:focus::after {
    opacity: 1;
    visibility: visible;
    top: calc(100% + 8px);
}

/* Отключаем тултипы на мобильных */
@media (hover: none) and (pointer: coarse) {
    .tooltip::after {
        display: none;
    }
}

/* ========== ПРЕДУПРЕЖДЕНИЯ ========== */
.rate-limit-warning {
    background: #fef3c7;
    color: #92400e;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 12px;
    text-align: center;
    animation: fadeIn 0.3s ease;
}

/* ========== ОНБОРДИНГ ========== */
.onboarding-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 43, 91, 0.96);
    z-index: 3000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    animation: fadeIn 0.3s ease;
}

.onboarding-content {
    text-align: center;
    color: white;
    max-width: 300px;
}

.onboarding-icon {
    font-size: 48px;
    margin-bottom: 20px;
}

.onboarding-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
}

.onboarding-text {
    font-size: 14px;
    line-height: 1.5;
    opacity: 0.9;
    margin-bottom: 24px;
}

.onboarding-steps {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
}

.onboarding-step {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transition: all 0.2s;
}

.onboarding-step.active {
    background: white;
    width: 24px;
    border-radius: 4px;
}

.onboarding-btn {
    background: white;
    color: #002B5B;
    border: none;
    padding: 12px 32px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
}

.onboarding-btn:hover {
    transform: scale(1.05);
}

.onboarding-skip {
    background: transparent;
    color: rgba(255, 255, 255, 0.7);
    border: none;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 12px;
}

.onboarding-skip:hover {
    color: white;
}

/* ========== FOCUS (доступность) ========== */
.header-btn:focus,
.send-button:focus,
.nav-action-btn:focus,
.lang-current:focus,
.onboarding-btn:focus,
.onboarding-skip:focus,
.chat-button:focus,
.lang-menu button:focus {
    outline: 2px solid #00A3E0;
    outline-offset: 2px;
}

/* ========== СКРИНРИДЕРЫ ========== */
.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

/* ========== LIVE REGION ДЛЯ СКРИНРИДЕРОВ ========== */
.live-region {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

/* ========== СТАТУС БАР АВТОРИЗАЦИИ ========== */
.auth-status {
    backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: normal;
    color: #e2e8f0;
}

/* ========== МОБИЛЬНАЯ АДАПТАЦИЯ ========== */
@media (max-width: 480px) {
    .chat-window {
        position: fixed;
        bottom: 0 !important;
        right: 0 !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        height: 100dvh !important;
        max-width: 100% !important;
        max-height: 100% !important;
        border-radius: 0 !important;
    }
    
    .chat-button {
        bottom: max(15px, env(safe-area-inset-bottom, 15px));
        right: 15px;
    }
    
    .header {
        border-radius: 0;
        padding-top: max(12px, env(safe-area-inset-top, 12px));
        padding-left: max(16px, env(safe-area-inset-left, 16px));
        padding-right: max(16px, env(safe-area-inset-right, 16px));
    }
    
    .header-left span:last-child {
        font-size: 14px;
        max-width: 180px;
    }
    
    .input-area {
        padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
        padding-left: max(12px, env(safe-area-inset-left, 12px));
        padding-right: max(12px, env(safe-area-inset-right, 12px));
    }
    
    .message {
        max-width: 90%;
    }
    
    #userInput {
        font-size: 16px; /* Предотвращает zoom на iOS */
    }

async function saveMessageToDB(message, role) {
    if (!currentUserId) {
        let temp = JSON.parse(sessionStorage.getItem('temp_history') || '[]');
        temp.push({ message, role, time: new Date().toISOString() });
        sessionStorage.setItem('temp_history', JSON.stringify(temp));
        console.log('💾 Сохранено временно (не авторизован)');
        return true;
    }
    
    console.log('💾 Сохраняем в БД для user_id:', currentUserId);
    
    try {
        const response = await fetch('api/save_message.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                user_id: currentUserId, 
                message, 
                role,
                token: currentUserToken // ИСПРАВЛЕНО: передаём токен
            })
        });
        const data = await response.json();
        return data.success === true;
    } catch(e) {
        console.error('Ошибка сохранения в БД:', e);
        return false;
    }
}

    if (!currentUserId) {

function initAudio() {
    if (audioEnabled) return; 
    if (!window.AudioContext && !window.webkitAudioContext) return;
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
    } catch (e) {
        console.warn('Не удалось инициализировать аудио:', e);
    }
}

function playNotificationSound() {
    console.log('🔊 Попытка воспроизвести звук, audioEnabled:', audioEnabled, 'audioContext:', !!audioContext);
    
    if (!audioEnabled || !audioContext) {
        console.log('❌ Звук не инициализирован, пробуем инициализировать');
        initAudio();
        if (!audioEnabled || !audioContext) {
            console.log('❌ Не удалось инициализировать аудио');
            return;
        }
    }
    
    try {
        if (audioContext.state === 'suspended') {
            console.log('⏸️ AudioContext suspended, пробуем resume');
            audioContext.resume().then(() => {
                playSoundInternal();
            }).catch(e => console.warn('Не удалось возобновить аудио:', e));
        } else {
            playSoundInternal();
        }
    } catch (error) {
        console.warn('Не удалось воспроизвести звук:', error);
    }
}

function playSoundInternal() {
    try {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.frequency.value = 600;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.3);
        console.log('✅ Звук воспроизведён!');
    } catch (e) {
        console.warn('Ошибка воспроизведения звука:', e);
    }
}

function validateMessage(text) {
    if (!text || typeof text !== 'string') {
        return { valid: false, error: getErrorMessage('invalidFormat') };
    }
    const trimmed = text.trim();
    if (trimmed.length < SECURITY_CONFIG.MIN_MESSAGE_LENGTH) {
        return { valid: false, error: getErrorMessage('tooShort') };
    }
    if (trimmed.length > SECURITY_CONFIG.MAX_MESSAGE_LENGTH) {
        return { valid: false, error: getErrorMessage('tooLong', { max: SECURITY_CONFIG.MAX_MESSAGE_LENGTH }) };
    }
    const suspiciousPatterns = [/<script/i, /javascript:/i, /onerror=/i, /onclick=/i, /<iframe/i];
    for (const pattern of suspiciousPatterns) {
        if (pattern.test(trimmed)) {
            logSecurityEvent('XSS_ATTEMPT', trimmed);
            return { valid: false, error: getErrorMessage('suspicious') };
        }
    }
    return { valid: true, text: trimmed };
}

function checkRateLimit() {
    const now = Date.now();
    requestTimestamps = requestTimestamps.filter(timestamp => now - timestamp < SECURITY_CONFIG.RATE_LIMIT.TIME_WINDOW);
    if (requestTimestamps.length >= SECURITY_CONFIG.RATE_LIMIT.MAX_REQUESTS) {
        const oldestRequest = requestTimestamps[0];
        const remainingTime = Math.ceil((SECURITY_CONFIG.RATE_LIMIT.TIME_WINDOW - (now - oldestRequest)) / 1000);
        showRateLimitWarning(remainingTime);
        logSecurityEvent('RATE_LIMIT_EXCEEDED', `Requests: ${requestTimestamps.length}`);
        return false;
    }
    requestTimestamps.push(now);
    return true;
}

function showRateLimitWarning(seconds) {
    const warning = document.getElementById('rateLimitWarning');
    if (!warning) return;
    const message = getErrorMessage('rateLimit', { seconds: seconds });
    warning.textContent = message;
    warning.style.display = 'block';
    announceToScreenReader(message);
    setTimeout(() => { warning.style.display = 'none'; }, 5000);
}

function logSecurityEvent(eventType, details) {
    const event = { type: eventType, timestamp: new Date().toISOString(), details: details, userAgent: navigator.userAgent };
    console.warn('Security Event:', event);
}

function getCurrentTime() {
    const d = new Date();
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function stopAllTyping() {
    if (currentTypeTimeout) { clearTimeout(currentTypeTimeout); currentTypeTimeout = null; }
    if (currentTypingElement) { currentTypingElement.textContent = ''; currentTypingElement = null; }
}

function stopAutoChange() {
    if (autoChangeInterval) { clearInterval(autoChangeInterval); autoChangeInterval = null; }
}

function getCurrentDisplayLang() {
    if (currentLang !== null && availableLangs.includes(currentLang)) {
        return currentLang;
    }
    if (currentLangIndex >= 0 && currentLangIndex < availableLangs.length) {
        return availableLangs[currentLangIndex];
    }
    return 'ru';
}

function showCenterText() {
    if (!centerTextDiv) return;
    if (isFirstMessageSent) { centerTextDiv.style.display = 'none'; return; }
    stopAllTyping();
    if (!centerTextDiv.parentNode) chatArea.appendChild(centerTextDiv);
    centerTextDiv.textContent = '';
    centerTextDiv.style.display = 'block';
    typeWriterSafe(centerMessages[getCurrentDisplayLang()], centerTextDiv, 35);
}

function typeWriterSafe(text, element, speed = 35) {
    stopAllTyping();
    if (!element || !text) return;
    while (element.firstChild) element.removeChild(element.firstChild);
    element.style.display = 'block';
    currentTypingElement = element;
    let i = 0;
    function type() {
        if (!currentTypingElement || currentTypingElement !== element) return;
        if (i < text.length) {
            element.appendChild(document.createTextNode(text.charAt(i)));
            i++;
            currentTypeTimeout = setTimeout(type, speed);
        } else {
            currentTypingElement = null;
            currentTypeTimeout = null;
        }
    }
    type();
}

function updatePlaceholder() {
    if (userInput) userInput.placeholder = placeholderMessages[getCurrentDisplayLang()];

function startAutoChange() {
    if (isFirstMessageSent) return;

    autoChangeInterval = setInterval(() => {

            setTimeout(() => { if (errorDiv && errorDiv.parentNode) errorDiv.remove(); }, 300);
        }
    }, 5000);
}

async function getAIResponse(question, lang, signal) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);
    try {
        const requestBody = { question: question };
        if (lang !== null && lang !== undefined) requestBody.lang = lang;
        const res = await fetch('http://127.0.0.1:8000/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody),
            signal: signal || controller.signal
        });
        clearTimeout(timeout);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        return data.response && data.response.trim() !== '' ? data.response : getErrorMessage('emptyResponse');
    } catch (e) {
        console.error("API Error:", e);
        return e.name === 'AbortError' ? getErrorMessage('timeout') : getErrorMessage('serverUnavailable');
    }
}

async function sendMessage() {
    if (isSending) return;
    if (!chatWindow || chatWindow.style.display !== 'flex') return;
    const text = userInput.value;
    const validation = validateMessage(text);
    if (!validation.valid) { showErrorMessage(validation.error); return; }
    if (!checkRateLimit()) return;
    isSending = true;
    setInputsDisabled(true);
    if (!isFirstMessageSent) {
        if (centerTextDiv && centerTextDiv.parentNode) { stopAllTyping(); centerTextDiv.remove(); }
        isFirstMessageSent = true;
        stopAutoChange();
        updatePlaceholder();
    }
    const time = getCurrentTime();
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message user-message';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = validation.text;
    const timeDiv = document.createElement('div');
    timeDiv.className = 'time';
    timeDiv.textContent = time;
    messageDiv.appendChild(bubble);
    messageDiv.appendChild(timeDiv);
    chatArea.appendChild(messageDiv);
    chatArea.scrollTop = chatArea.scrollHeight;
    userInput.value = '';
    userInput.style.height = 'auto';
    
    await saveMessageToDB(validation.text, 'user');
    
    const typingId = showTypingIndicator();
    currentRequestController = new AbortController();
    const timeoutId = setTimeout(() => { if (currentRequestController) currentRequestController.abort(); }, SECURITY_CONFIG.REQUEST_TIMEOUT);
    try {
        const responseText = await getAIResponse(validation.text, currentLang, currentRequestController.signal);
        clearTimeout(timeoutId);
        setTimeout(async () => {
            removeTypingIndicator(typingId);
            const botMessageDiv = document.createElement('div');
            botMessageDiv.className = 'message';
            const botBubble = document.createElement('div');
            botBubble.className = 'bot-message';
            botBubble.textContent = responseText;
            const botTimeDiv = document.createElement('div');
            botTimeDiv.className = 'time';
            botTimeDiv.textContent = getCurrentTime();
            botMessageDiv.appendChild(botBubble);
            botMessageDiv.appendChild(botTimeDiv);
            chatArea.appendChild(botMessageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            limitChatMessages();
            playNotificationSound();
            announceToScreenReader('Новое сообщение от бота: ' + responseText.substring(0, 100));
            
            await saveMessageToDB(responseText, 'assistant');
            
            isSending = false;
            setInputsDisabled(false);
            currentRequestController = null;
        }, 600);
    } catch (error) {
        clearTimeout(timeoutId);
        removeTypingIndicator(typingId);
        let errorMessage = getErrorMessage('connectionError');
        if (error.name === 'AbortError') errorMessage = getErrorMessage('timeout');
        else if (error.message) errorMessage = getErrorMessage('apiError') + ': ' + error.message;
        logSecurityEvent('API_ERROR', errorMessage);
        showErrorMessage(errorMessage);
        
        await saveMessageToDB(errorMessage, 'assistant');
        
        isSending = false;
        setInputsDisabled(false);
        currentRequestController = null;
    }
}

function setLang(lang) {
    if (lang !== null && !availableLangs.includes(lang)) { console.error('Invalid language:', lang); return; }
    currentLang = lang;
    if (langCurrentBtn) {
        langCurrentBtn.innerHTML = lang === null ? '<span aria-hidden="true">🌐</span>' : `<span aria-hidden="true">${langFlags[lang]}</span>`;
    }
    
    const langMenu = document.getElementById('langMenu');
    if (langMenu) {
        langMenu.querySelectorAll('button').forEach(btn => {
            btn.setAttribute('aria-selected', 'false');
        });
        const selectedIndex = lang === null ? 0 : availableLangs.indexOf(lang) + 1;
        const selectedBtn = langMenu.querySelectorAll('button')[selectedIndex];
        if (selectedBtn) selectedBtn.setAttribute('aria-selected', 'true');
    }
    
    updateChatTitle();
    updateNavLabels();
    updateOnboardingContent();
    updateHtmlLang();
    updateSkipLink();
    updateInputAccessibility();
    
    const menu = document.getElementById('langMenu');
    if (menu) menu.style.display = 'none';
    const langBtn = document.getElementById('langCurrentBtn');
    if (langBtn) langBtn.setAttribute('aria-expanded', 'false');
    if (!isFirstMessageSent) {
        showCenterText();
        updatePlaceholder();
        if(lang === null) {
            startAutoChange();
        } else {
            stopAutoChange();
        }
    } else {
        updatePlaceholder();
    }
}

function toggleLangMenu() {
    const menu = document.getElementById('langMenu');
    const btn = document.getElementById('langCurrentBtn');
    if (!menu) return;
    const isOpen = menu.style.display === 'flex';
    menu.style.display = isOpen ? 'none' : 'flex';
    if (btn) btn.setAttribute('aria-expanded', (!isOpen).toString());
    
    if (!isOpen) {
        const firstBtn = menu.querySelector('button');
        if (firstBtn) setTimeout(() => firstBtn.focus(), 100);
    }
}

function quickNavAction(action) {
    if (isSending) return;
    
    const displayLang = getCurrentDisplayLang();
    const replyData = (quickReplies[displayLang]?.[action]) || quickReplies.ru[action];
    
    if (!replyData) return;
    
    if (!isFirstMessageSent) {
        if (centerTextDiv && centerTextDiv.parentNode) { 
            stopAllTyping(); 
            centerTextDiv.style.display = 'none';
            centerTextDiv.remove();
        }
        isFirstMessageSent = true;
        stopAutoChange();
        updatePlaceholder();
    }
    
    const userTime = getCurrentTime();
    const userMessageDiv = document.createElement('div');
    userMessageDiv.className = 'message user-message';
    const userBubble = document.createElement('div');
    userBubble.className = 'bubble';
    const buttonText = (navActionLabels[displayLang]?.[action] || navActionLabels.ru[action]);
    userBubble.textContent = buttonText;
    const userTimeDiv = document.createElement('div');
    userTimeDiv.className = 'time';
    userTimeDiv.textContent = userTime;
    userMessageDiv.appendChild(userBubble);
    userMessageDiv.appendChild(userTimeDiv);
    chatArea.appendChild(userMessageDiv);
    
    saveMessageToDB(buttonText, 'user');
    
    const typingId = showTypingIndicator();
    
    setTimeout(async () => {
        removeTypingIndicator(typingId);
        
        const botMessageDiv = document.createElement('div');
        botMessageDiv.className = 'message';
        const botBubble = document.createElement('div');
        botBubble.className = 'bot-message';
        
        if (replyData.hasLink) {
            botBubble.innerHTML = replyData.text;
            const links = botBubble.querySelectorAll('a');
            links.forEach(link => {
                link.setAttribute('target', '_blank');
                link.setAttribute('rel', 'noopener noreferrer');
                link.style.color = '#fff';
                link.style.textDecoration = 'underline';
            });
        } else {
            botBubble.textContent = replyData.text;
        }
        
        const botTimeDiv = document.createElement('div');
        botTimeDiv.className = 'time';
        botTimeDiv.textContent = getCurrentTime();
        botMessageDiv.appendChild(botBubble);
        botMessageDiv.appendChild(botTimeDiv);
        chatArea.appendChild(botMessageDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        
        playNotificationSound();
        limitChatMessages();
        
        const plainText = botBubble.textContent || botBubble.innerText;
        announceToScreenReader('Ответ бота: ' + plainText.substring(0, 150));
        
        await saveMessageToDB(replyData.text, 'assistant');
        
        isSending = false;
        setInputsDisabled(false);
        currentRequestController = null;
    }, 500);
    
    if (userInput) userInput.value = '';
    isSending = true;
    setInputsDisabled(true);
}

function updateNavLabels() {
    const displayLang = getCurrentDisplayLang();
    const labels = navActionLabels[displayLang] || navActionLabels['ru'];
    const ariaLabels = navActionAriaLabels[displayLang] || navActionAriaLabels['ru'];
    
    const navApply = document.getElementById('navApply');
    const navSchedule = document.getElementById('navSchedule');
    const navInstructions = document.getElementById('navInstructions');
    const navFaq = document.getElementById('navFaq');
    
    const navApplyBtn = document.getElementById('navApplyBtn');
    const navScheduleBtn = document.getElementById('navScheduleBtn');
    const navInstructionsBtn = document.getElementById('navInstructionsBtn');
    const navFaqBtn = document.getElementById('navFaqBtn');
    
    if (navApply) navApply.textContent = labels.apply;
    if (navSchedule) navSchedule.textContent = labels.schedule;
    if (navInstructions) navInstructions.textContent = labels.instructions;
    if (navFaq) navFaq.textContent = labels.faq;
    
    if (navApplyBtn) navApplyBtn.setAttribute('aria-label', ariaLabels.apply);
    if (navScheduleBtn) navScheduleBtn.setAttribute('aria-label', ariaLabels.schedule);
    if (navInstructionsBtn) navInstructionsBtn.setAttribute('aria-label', ariaLabels.instructions);
    if (navFaqBtn) navFaqBtn.setAttribute('aria-label', ariaLabels.faq);
}

function checkOnboarding() {
    try { hasSeenOnboarding = localStorage.getItem('chatOnboardingSeen') === 'true'; } catch (e) { hasSeenOnboarding = false; }
    if (!hasSeenOnboarding) showOnboarding();
}

function showOnboardingManually() {
    onboardingStep = 0;
    showOnboarding();
}

function showOnboarding() {
    const overlay = document.getElementById('onboardingOverlay');
    if (!overlay) return;
    onboardingStep = 0;
    updateOnboardingContent();
    overlay.style.display = 'flex';
    
    setTimeout(() => {
        const nextBtn = document.getElementById('onboardingNextBtn');
        if (nextBtn) nextBtn.focus();
    }, 300);
    
    if (currentLang === null) startAutoChange();
}

function updateOnboardingContent() {
    const displayLang = getCurrentDisplayLang();
    const data = onboardingData[displayLang] || onboardingData['ru'];
    const step = data[onboardingStep];
    if (!step) return;
    document.getElementById('onboardingIcon').textContent = step.icon;
    document.getElementById('onboardingTitle').textContent = step.title;
    document.getElementById('onboardingText').textContent = step.text;
    const btnTexts = { ru: "Далее", en: "Next", fr: "Suivant", es: "Siguiente" };
    const finishTexts = { ru: "Начать", en: "Start", fr: "Commencer", es: "Empezar" };
    const skipTexts = { ru: "Пропустить", en: "Skip", fr: "Passer", es: "Saltar" };
    const btn = document.getElementById('onboardingNextBtn');
    const skipBtn = document.querySelector('.onboarding-skip');
    if (btn) btn.textContent = onboardingStep === data.length - 1 ? (finishTexts[displayLang] || finishTexts['ru']) : (btnTexts[displayLang] || btnTexts['ru']);
    if (skipBtn) skipBtn.textContent = skipTexts[displayLang] || skipTexts['ru'];
    document.querySelectorAll('.onboarding-step').forEach((stepEl, index) => {
        stepEl.classList.toggle('active', index === onboardingStep);
        stepEl.setAttribute('aria-selected', (index === onboardingStep).toString());
    });
}

function nextOnboardingStep() {
    const displayLang = getCurrentDisplayLang();
    const data = onboardingData[displayLang] || onboardingData['ru'];
    if (onboardingStep < data.length - 1) {
        onboardingStep++;
        updateOnboardingContent();
    } else {
        skipOnboarding();
    }
}

function skipOnboarding() {
    const overlay = document.getElementById('onboardingOverlay');
    if (overlay) overlay.style.display = 'none';
    try { localStorage.setItem('chatOnboardingSeen', 'true'); } catch (e) { console.warn('localStorage недоступен:', e); }
    hasSeenOnboarding = true;
    
    setTimeout(() => {
        if (userInput) userInput.focus();
    }, 100);
}

function toggleTheme() {
    const chatWin = document.getElementById('chatWindow');
    const themeBtn = document.getElementById('themeToggleBtn');
    if (!chatWin) return;
    chatWin.classList.toggle('dark');
    const isDark = chatWin.classList.contains('dark');
    if (themeBtn) themeBtn.setAttribute('aria-pressed', isDark.toString());
    try { localStorage.setItem('chatTheme', isDark ? 'dark' : 'light'); } catch (e) { console.warn('localStorage недоступен:', e); }
}

async function clearChat() {    
    if (currentRequestController) {
        currentRequestController.abort();
        currentRequestController = null;
    }
    isSending = false;
    setInputsDisabled(false);
    stopAllTyping();
    stopAutoChange();
    
    await clearChatHistoryDB();
    
    chatArea.innerHTML = '';
    const newCenterDiv = document.createElement('div');
    newCenterDiv.id = 'centerText';
    newCenterDiv.className = 'center-text';
    newCenterDiv.setAttribute('aria-live', 'polite');
    chatArea.appendChild(newCenterDiv);
    centerTextDiv = newCenterDiv;
    isFirstMessageSent = false;
    currentLangIndex = 0;
    requestTimestamps = [];
    showCenterText();
    updatePlaceholder();
    updateNavLabels();
    const menu = document.getElementById('langMenu');
    if (menu) menu.style.display = 'none';
    if (currentLang === null) startAutoChange();
    announceToScreenReader(getCurrentDisplayLang() === 'ru' ? 'Чат очищен' : 'Chat cleared');
}

function autoResizeInput() {
    if (!userInput) return;
    userInput.style.height = 'auto';
    userInput.style.height = Math.max(20, Math.min(userInput.scrollHeight, 60)) + 'px';
}

function toggleChat() {
    if (!chatWindow) return;
    const isOpening = chatWindow.style.display !== 'flex';
    const chatToggleBtn = document.getElementById('chatToggleBtn');
    if (isOpening) {
        chatWindow.style.display = 'flex';
        chatWindow.setAttribute('aria-hidden', 'false');
        if (chatToggleBtn) chatToggleBtn.setAttribute('aria-expanded', 'true');
        if (window.innerWidth <= 480) {
            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
            document.body.style.width = '100%';
        }
        checkOnboarding();
        
        // При открытии проверяем актуального пользователя
        if (currentUserId) {
            console.log('🔄 Открытие чата: загружаем историю из БД');
            loadHistoryFromDB();
        } else if (!isFirstMessageSent) {
            showCenterText();
            updatePlaceholder();
            updateNavLabels();
            if (currentLang === null) startAutoChange();
        }
        
        setTimeout(() => {
            if (userInput && hasSeenOnboarding) userInput.focus();
        }, 300);
    } else {
        chatWindow.style.display = 'none';
        chatWindow.setAttribute('aria-hidden', 'true');
        if (chatToggleBtn) chatToggleBtn.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.width = '';
        stopAutoChange();
        const menu = document.getElementById('langMenu');
        if (menu) menu.style.display = 'none';
        if (currentRequestController) {
            currentRequestController.abort();
            currentRequestController = null;
        }
        isSending = false;
        setInputsDisabled(false);
        
        if (chatToggleBtn) chatToggleBtn.focus();
    }
}

function handleLangMenuKeyboard(e) {
    const menu = document.getElementById('langMenu');
    if (!menu || menu.style.display !== 'flex') return;
    
    const buttons = Array.from(menu.querySelectorAll('button'));
    const currentIndex = buttons.indexOf(document.activeElement);
    
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        e.preventDefault();
        const nextIndex = (currentIndex + 1) % buttons.length;
        buttons[nextIndex].focus();
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        e.preventDefault();
        const prevIndex = (currentIndex - 1 + buttons.length) % buttons.length;
        buttons[prevIndex].focus();
    } else if (e.key === 'Escape') {
        toggleLangMenu();
        langCurrentBtn.focus();
    }
}

// ========== ОБРАБОТКА АВТОРИЗАЦИИ (ИСПРАВЛЕНО: сохраняем токен) ==========
window.addEventListener('message', function(event) {
    console.log('📨 Получено сообщение от родителя:', event.data);
    
    if (event.data && event.data.type === 'AUTH_DATA') {
        if (event.data.user && event.data.user.id) {
            // Вход пользователя
            currentUserId = event.data.user.id;
            currentUserName = event.data.user.fullname;
            currentUserToken = event.data.token || null; // ИСПРАВЛЕНО: сохраняем токен
            console.log('✅ АВТОРИЗОВАН! ID:', currentUserId, 'Имя:', currentUserName);
            updateAuthStatusUI();
            loadHistoryFromDB();
        } else {
            // Выход пользователя
            console.log('🚪 Получен сигнал выхода (пустой user)');
            forceClearChatOnLogout();
        }
    }
    
    if (event.data && event.data.type === 'LOGOUT') {
        console.log('🚪 Получено событие LOGOUT');
        forceClearChatOnLogout();
    }
    
    if (event.data && event.data.type === 'SESSION_CLEAR') {
        console.log('🧹 Получено событие SESSION_CLEAR');
        forceClearChatOnLogout();
    }
});

// Мониторинг localStorage на случай выхода (ИСПРАВЛЕНО: получаем токен)
let lastUserIdCheck = null;
setInterval(() => {
    try {
        const directUser = localStorage.getItem('user');
        const directToken = localStorage.getItem('auth_token'); // ИСПРАВЛЕНО: получаем токен
        const currentUserJson = directUser ? JSON.parse(directUser) : null;
        const currentUserIdFromStorage = currentUserJson?.id || null;
        
        if (currentUserId && !currentUserIdFromStorage) {
            console.log('🚪 Обнаружен выход через localStorage');
            forceClearChatOnLogout();
        }
        
        if (!currentUserId && currentUserIdFromStorage && currentUserJson) {
            console.log('🔐 Обнаружен вход через localStorage');
            currentUserId = currentUserIdFromStorage;
            currentUserName = currentUserJson.fullname || 'Пользователь';
            currentUserToken = directToken || null; // ИСПРАВЛЕНО: сохраняем токен
            updateAuthStatusUI();
            loadHistoryFromDB();
        }
    } catch(e) {}
}, 500);

// ========== ИНИЦИАЛИЗАЦИЯ ==========
window.addEventListener('DOMContentLoaded', () => {
    chatWindow = document.getElementById('chatWindow');
    chatArea = document.getElementById('chatArea');
    userInput = document.getElementById('userInput');
    centerTextDiv = document.getElementById('centerText');
    langCurrentBtn = document.getElementById('langCurrentBtn');
    sendButton = document.getElementById('sendButton');
    liveRegion = document.getElementById('liveRegion');
    authStatusSpan = document.getElementById('authStatus');
    
    if (centerTextDiv) {
        centerTextDiv.textContent = centerMessages[getCurrentDisplayLang()];
        centerTextDiv.style.display = 'block';
    }
    if (userInput) {
        userInput.placeholder = placeholderMessages[getCurrentDisplayLang()];
        userInput.setAttribute('maxlength', SECURITY_CONFIG.MAX_MESSAGE_LENGTH);
    }
    if (langCurrentBtn) langCurrentBtn.innerHTML = '<span aria-hidden="true">🌐</span>';
    if (userInput) {
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            if (e.key === 'Escape') toggleChat();
        });
        userInput.addEventListener('input', autoResizeInput);
    }
    try {
        const savedTheme = localStorage.getItem('chatTheme');
        if (savedTheme === 'dark') {
            document.getElementById('chatWindow').classList.add('dark');
            const themeBtn = document.getElementById('themeToggleBtn');
            if (themeBtn) themeBtn.setAttribute('aria-pressed', 'true');
        }
        hasSeenOnboarding = localStorage.getItem('chatOnboardingSeen') === 'true';
    } catch (e) {
        console.warn('localStorage недоступен:', e);
    }
    updateNavLabels();
    updateChatTitle();
    updateHtmlLang();
    updateSkipLink();
    updateInputAccessibility();
    updateAuthStatusUI();
    
    [sendButton, userInput, document.querySelector('.chat-button')].forEach(el => {
        if (el) {
            el.addEventListener('click', initAudio, { once: true });
            el.addEventListener('keydown', initAudio, { once: true });
        }
    });
    
    window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
});

document.addEventListener('click', function(event) {
    const langSwitcher = document.querySelector('.lang-switcher');
    const langMenu = document.getElementById('langMenu');
    if (langSwitcher && langMenu && !langSwitcher.contains(event.target)) {
        langMenu.style.display = 'none';
        const langBtn = document.getElementById('langCurrentBtn');
        if (langBtn) langBtn.setAttribute('aria-expanded', 'false');
    }
});

document.addEventListener('keydown', handleLangMenuKeyboard);

// Глобальные функции
window.toggleChat = toggleChat;
window.sendMessage = sendMessage;
window.setLang = setLang;
window.toggleLangMenu = toggleLangMenu;
window.toggleTheme = toggleTheme;
window.clearChat = clearChat;
window.quickNavAction = quickNavAction;
window.nextOnboardingStep = nextOnboardingStep;
window.skipOnboarding = skipOnboarding;
window.showOnboardingManually = showOnboardingManually;

document.addEventListener('mouseup', (e) => {
    if (e.target.closest('button')) {
        e.target.closest('button').blur();
    }
});
</script>
